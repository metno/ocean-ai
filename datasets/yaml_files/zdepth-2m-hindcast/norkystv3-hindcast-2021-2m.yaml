dates:
  start: '2021-01-01T00:00:00'
  end: '2021-12-31T23:00:00'
  frequency: 1h
build:
  group_by: 24
statistics:
  allow_nans:
  - temperature
  - salinity
  - u_eastward
  - v_northward
  - ubar_eastward
  - vbar_northward
  - zeta
  - Uwind_eastward
  - Vwind_northward
input:
  join:
  - netcdf:
      path: /lustre/storeB/project/fou/hi/foccus/datasets/symlinks/norkystv3_zdepth-hindcast/2021/*
      param:
      - temperature
      - salinity
      - u_eastward
      - v_northward
      level: 2
  - netcdf:
      path: /lustre/storeB/project/fou/hi/foccus/datasets/symlinks/norkystv3_zdepth-hindcast/2021/*
      param:
      - ubar_eastward
      - vbar_northward
      - zeta
      - Uwind_eastward
      - Vwind_northward
  - repeated_dates:
      mode: constant
      source:
        netcdf:
          path: /lustre/storeB/project/fou/hi/foccus/datasets/symlinks/norkystv3_zdepth-hindcast/2021/norkyst800-20210101.nc
          param:
          - h
          - sea_mask
missing: []
