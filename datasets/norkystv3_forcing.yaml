dates:
  start: 2024-01-01 00:00:00
  end: 2024-01-03 00:00:00
  frequency: 1h
build:
  groupby: 24
resolution: o96
statistics:
  allow_nans:
  - temperature
  - salinity
  - u_eastward
  - v_northward
  - w
input:
  join:
    - netcdf:
        path: /lustre/storeB/project/fou/hi/foccus/datasets/*
        param:
        - temperature
        - salinity
        - u_eastward
        - v_northward
        - w
        - zeta
    - forcings:
        template: ${input.join.0.netcdf}
        param:
        - "cos_latitude"
        - "cos_longitude"
        - "sin_latitude"
        - "sin_longitude"
        - "cos_julian_day"
        - "cos_local_time"
        - "sin_julian_day"
        - "sin_local_time"
        - "insolation"
        - "Uwind_eastward"
        - "Vwind_northward"

missing: []
